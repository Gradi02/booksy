version: "1"

services:
  - type: web
    name: hardware-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hardware-postgres
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app,http://localhost:5173" 

databases:
  - name: hardware-postgres
    plan: free
    region: frankfurt